<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
    body{
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
    }

    input{
        padding: 8px;
        width: 200px;
    }

    button{
        padding: 8px 12px;
        cursor: pointer;
    }
    ul{
        padding: 3px;
    }
   
    
    li{
        display: flex;
        list-style: none;
        margin: 0 auto;
        width: 250px;
        padding: 3px;
        background: #f2f2f2;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .delete{
        color: red;
        cursor: pointer;
        font-weight: bold;
    }
    .checked{
    position: relative;
}

.checked::after{
    content: "";
    position: absolute;
    left: 10px;
    right: 35px;   /* ❌ ko avoid karne ke liye */
    top: 50%;
    height: 2px;
    background: black;
    transform: translateY(-50%);
}
</style>
</head>

<body>

<input type="text" id="input" placeholder="Enter task">
<button onclick="addData()">Add</button>

<ul class="list-container">
    <!-- <li class="checked"></li> -->
</ul>

<script>
const input = document.getElementById("input");
const listC = document.querySelector(".list-container");

function addData(){
    if(input.value === ''){
        alert("Empty!");
    }else{
        let li = document.createElement("li");
        li.textContent = input.value;
        listC.appendChild(li);
        let span = document.createElement("span");
        span.innerHTML = '❌';
        li.appendChild(span);
        input.value = "";
        saveData();




    }
}

listC.addEventListener('click' ,function(e){
    if(e.target.tagName == 'LI'){
        e.target.classList.toggle("checked");
        saveData();
    }else if(e.target.tagName == 'SPAN'){
        e.target.parentElement.remove();
        saveData();

    }
})


function saveData(){
    localStorage.setItem("data" , listC.innerHTML);
}
function showData(){
    listC.innerHTML = localStorage.getItem("data");
}

showData();
</script>

</body>
</html>
